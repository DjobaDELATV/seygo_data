name: Generate/Upload Database (Incremental)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,8,12,16,20 * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: db-pipeline
  cancel-in-progress: false

jobs:
  incremental:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Hash individual files before run
        id: hash_before
        run: |
          if [ -d "data/individual" ] && [ "$(ls -A data/individual 2>/dev/null)" ]; then
            HASH=$(find data/individual -type f -name "*.json" | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1)
            find data/individual -type f -name "*.json" | sort > /tmp/files_before.txt
          else
            HASH="no-data"
            touch /tmp/files_before.txt
          fi
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Before hash: $HASH"

      - name: Run YGOJSON (Incremental)
        run: |
          if [ "${{ steps.hash_before.outputs.hash }}" = "no-data" ]; then
            echo "No cached data found, bootstrapping with --download"
            ygojson --production --download
          else
            ygojson --production
          fi

      - name: Hash individual files after run
        id: hash_after
        run: |
          HASH=$(find data/individual -type f -name "*.json" | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1)
          find data/individual -type f -name "*.json" | sort > /tmp/files_after.txt
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "After hash: $HASH"

      - name: Detect changes
        id: changes
        run: |
          BEFORE="${{ steps.hash_before.outputs.hash }}"
          AFTER="${{ steps.hash_after.outputs.hash }}"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will publish."
          else
            echo "detected=false" >> $GITHUB_OUTPUT
            echo "No changes detected, skipping publish."
          fi

          # Detect new entity files (new UUID JSON files = new cards/sets/series/skills)
          NEW_COUNT=$(comm -13 /tmp/files_before.txt /tmp/files_after.txt | wc -l | tr -d ' ')
          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "new_entities=true" >> $GITHUB_OUTPUT
            echo "New entities detected ($NEW_COUNT new files), webhook will fire."
          else
            echo "new_entities=false" >> $GITHUB_OUTPUT
            echo "No new entities (corrections only), skipping webhook."
          fi

      - name: Push Individuals
        if: steps.changes.outputs.detected == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="v1/individual"
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          TMPDIR=$(mktemp -d)
          git -C "$TMPDIR" init
          git -C "$TMPDIR" checkout --orphan "$BRANCH"
          cp -r data/individual/. "$TMPDIR/"
          git -C "$TMPDIR" add -A
          git -C "$TMPDIR" commit -m "Update individual data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git -C "$TMPDIR" push --force "$REPO_URL" "HEAD:refs/heads/$BRANCH"; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            [ $i -lt 3 ] && { echo "Retrying in 30s..."; sleep 30; }
          done

          echo "All push attempts failed."
          exit 1

      - name: Archive Individuals
        if: steps.changes.outputs.detected == 'true'
        uses: vimtor/action-zip@v1.2
        with:
          files: data/individual
          dest: individual.zip

      - name: Archive Aggregate
        if: steps.changes.outputs.detected == 'true'
        uses: vimtor/action-zip@v1.2
        with:
          files: data/aggregate
          dest: aggregate.zip

      - name: Get Latest Release
        id: latest_release
        if: steps.changes.outputs.detected == 'true'
        uses: gregziegan/fetch-latest-release@v2.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove Old Individuals ZIP
        if: steps.changes.outputs.detected == 'true'
        uses: flcdrg/remove-release-asset-action@v4.0.4
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ steps.latest_release.outputs.id }}
          asset_name: individual.zip

      - name: Upload Individuals ZIP
        if: steps.changes.outputs.detected == 'true'
        uses: csexton/release-asset-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-url: ${{ steps.latest_release.outputs.upload_url }}
          file: individual.zip

      - name: Remove Old Aggregate ZIP
        if: steps.changes.outputs.detected == 'true'
        uses: flcdrg/remove-release-asset-action@v4.0.4
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ steps.latest_release.outputs.id }}
          asset_name: aggregate.zip

      - name: Upload Aggregate ZIP
        if: steps.changes.outputs.detected == 'true'
        uses: csexton/release-asset-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-url: ${{ steps.latest_release.outputs.upload_url }}
          file: aggregate.zip

      - name: Notify webhook
        if: steps.changes.outputs.new_entities == 'true'
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.YGOJSON_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.YGOJSON_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "YGOJSON_WEBHOOK_URL not configured, skipping."
            exit 0
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-YGOJSON-Secret: $WEBHOOK_SECRET" \
            -d '{"source":"incremental","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' \
            --max-time 10 \
            && echo "Webhook notified." \
            || echo "Webhook notification failed (non-fatal)."

      - name: Teardown
        uses: ./.github/actions/teardown
        if: always()
